<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TANKY — Jogar Batalha de Tanques Online Grátis</title>
<meta name="description" content="TANKY: jogue a batalha de tanques por turnos online e de graça! 2 jogadores, contra o computador, GIGA Battle, modo Sandbox e Loja DLC. Mire o ângulo, ajuste a potência e acerte o inimigo!">
<meta name="keywords" content="tanky, tanky jogar, jogar tanky, jogo de tanques, batalha de tanques, tank, jogo online grátis, tanky online">
<link rel="canonical" href="https://cacaivilela.github.io/tanky/">
<meta name="author" content="Caio Henrique Barros Vilela">
<!-- Compartilhamento (WhatsApp, redes sociais) -->
<meta property="og:type" content="website">
<meta property="og:title" content="TANKY — Jogar Batalha de Tanques">
<meta property="og:description" content="Jogue TANKY online e de graça: batalha de tanques por turnos, 2 jogadores ou contra o computador!">
<meta property="og:url" content="https://cacaivilela.github.io/tanky/">
<meta property="og:image" content="https://cacaivilela.github.io/tanky/icon-512.png">
<meta property="og:locale" content="pt_BR">
<meta name="twitter:card" content="summary">
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d2647">
<link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
  <h1 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap">TANKY — Jogar Batalha de Tanques Online</h1>
  <div id="game-wrap">
    <canvas id="game" width="1000" height="600"></canvas>
    <button id="music-toggle" type="button" title="Música" aria-label="Ligar ou desligar a música">🔊</button>

    <!-- HUD superior -->
    <div id="hud">
      <div class="player-info" id="p1-info">
        <span class="tank-name"><span class="tk-ico" id="p1-ico" data-icon="tank" data-scale="2" data-color="#22c55e"></span> <span id="p1-name">JOGADOR 1</span></span>
        <div class="health-bar"><div class="health-fill" id="p1-health"></div></div>
      </div>
      <div id="center-hud">
        <div id="wind-display">Vento: <span id="wind-val">→ 0</span></div>
        <div id="turn-display">Vez do Jogador 1</div>
      </div>
      <div class="player-info" id="p2-info">
        <span class="tank-name"><span id="p2-name">JOGADOR 2</span> <span class="tk-ico" id="p2-ico" data-icon="tank" data-scale="2" data-color="#ef4444"></span></span>
        <div class="health-bar"><div class="health-fill" id="p2-health"></div></div>
      </div>
    </div>

    <!-- Painel de controle inferior -->
    <div id="controls">
      <div class="ctrl-group">
        <span class="label">Ângulo</span>
        <span class="value" id="angle-val">45°</span>
      </div>
      <div class="ctrl-group">
        <span class="label">Potência</span>
        <div class="power-bar"><div class="power-fill" id="power-fill"></div></div>
      </div>
      <div class="ctrl-group">
        <span class="label">Arma</span>
        <span class="value" id="weapon-val"><span class="px-inline" data-icon="shot" data-scale="2"></span> Tiro Normal</span>
      </div>
      <div class="ctrl-group">
        <span class="label">Combustível</span>
        <span class="value" id="fuel-val">100</span>
      </div>
    </div>

    <!-- Telas de menu / fim de jogo -->
    <div id="overlay">
      <div id="overlay-box">
        <div class="cover">
          <div class="cover-sun"></div>
          <div class="cover-cloud c1"></div>
          <div class="cover-cloud c2"></div>
          <span class="cover-tank left" data-icon="tank" data-color="#22c55e" data-scale="6"></span>
          <span class="cover-tank right" data-icon="tank" data-color="#ef4444" data-scale="6"></span>
          <div class="cover-title">TANKY</div>
        </div>
        <p class="subtitle"><span class="px-inline" data-icon="swords" data-scale="2"></span> Batalha de Tanques por Turnos <span class="px-inline" data-icon="swords" data-scale="2"></span></p>
        <div id="coins-bar"></div>
        <div id="loadout"></div>
        <div class="btn-row">
          <button id="start-pvp" class="start-btn"><span class="px-inline" data-icon="people" data-scale="2"></span> 2 JOGADORES</button>
          <button id="start-pvc" class="start-btn"><span class="px-inline" data-icon="robot" data-scale="2"></span> VS COM</button>
        </div>
        <div class="btn-row" style="margin-top:14px">
          <button id="start-giga" class="start-btn" style="background:linear-gradient(#c084fc,#7c3aed);box-shadow:0 6px 0 #5b21b6;color:#fff"><span class="px-inline" data-icon="bomb" data-scale="2"></span> GIGA BATTLE</button>
          <button id="start-sandbox" class="start-btn" style="background:linear-gradient(#34d399,#0f766e);box-shadow:0 6px 0 #115e4c;color:#04221a"><span class="px-inline" data-icon="ctrld" data-scale="2"></span> SANDBOX</button>
        </div>
        <div class="btn-row" style="margin-top:14px">
          <button id="open-shop" class="start-btn" style="background:linear-gradient(#fbbf24,#d97706);box-shadow:0 6px 0 #92400e;color:#1a0820"><span class="px-inline" data-icon="coin" data-scale="2"></span> LOJA DLC</button>
          <button id="open-credits" class="start-btn" style="background:linear-gradient(#94a3b8,#64748b);box-shadow:0 6px 0 #475569;color:#0b1220"><span class="px-inline" data-icon="trophy" data-scale="2"></span> CRÉDITOS</button>
        </div>
        <div class="btn-row" style="margin-top:14px">
          <button id="open-fusion" class="start-btn" style="background:linear-gradient(#c084fc,#7c3aed);box-shadow:0 6px 0 #5b21b6;color:#fff"><span class="px-inline" data-icon="swords" data-scale="2"></span> FUSÃO DE ARMAS</button>
        </div>
        <div class="btn-row" style="margin-top:14px">
          <button id="install-app" class="start-btn" style="display:none;background:linear-gradient(#34d399,#0f766e);box-shadow:0 6px 0 #115e4c;color:#04221a"><span class="px-inline" data-icon="rocket" data-scale="2"></span> INSTALAR APP</button>
        </div>
        <a class="credit" href="https://cacaivilela.github.io/" target="_blank" rel="noopener">Feito por Caio Henrique Barros Vilela</a>
      </div>
    </div>
  </div>

  <!-- Controles de toque (edição de celular) — fora do #game-wrap para não
       herdar a escala e manter os botões grandes em qualquer tela -->
  <div id="touch-controls" aria-hidden="true">
    <div class="tc-cluster tc-aim">
      <div class="tc-cap">Mira</div>
      <div class="tc-row">
        <button class="tc-btn" type="button" data-hold="ArrowUp" aria-label="Subir a mira">▲</button>
        <button class="tc-btn" type="button" data-hold="ArrowDown" aria-label="Descer a mira">▼</button>
      </div>
    </div>
    <div class="tc-cluster tc-move">
      <div class="tc-cap">Mover</div>
      <div class="tc-row">
        <button class="tc-btn" type="button" data-hold="ArrowLeft" aria-label="Mover para a esquerda">◀</button>
        <button class="tc-btn" type="button" data-hold="ArrowRight" aria-label="Mover para a direita">▶</button>
      </div>
    </div>
    <div class="tc-cluster tc-right">
      <div class="tc-row">
        <button class="tc-btn tc-small" type="button" data-weap="-1" aria-label="Arma anterior">◀</button>
        <span class="tc-cap" style="margin:0">Arma</span>
        <button class="tc-btn tc-small" type="button" data-weap="1" aria-label="Próxima arma">▶</button>
      </div>
      <button class="tc-btn tc-fire" type="button" id="tc-fire" aria-label="Atirar (segure para mais força)">FOGO</button>
    </div>
    <button class="tc-btn tc-ff" type="button" data-hold="v" aria-label="Acelerar a partida">»</button>
  </div>

  <!-- Aviso para virar o celular na horizontal -->
  <div id="rotate-hint" aria-hidden="true">
    <div class="rh-ico">📱</div>
    <div class="rh-txt">Vire o celular na horizontal<br>para jogar melhor!</div>
  </div>

  <script src="pixelart.js"></script>
  <script src="dlc.js"></script>
  <script src="music.js"></script>
  <script src="game.js"></script>
  <script src="mobile.js"></script>
</body>
</html>
